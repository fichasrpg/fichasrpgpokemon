<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéSheet Pro - RPG</title>
    <style>
        :root {
            --poke-red: #ff1c1c;
            --poke-dark-red: #b30000;
            --poke-blue: #2a75bb;
            --poke-yellow: #ffcb05;
            --screen-bg: #90ad98; /* Verde clássico de GameBoy */
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        .pokedex {
            width: 100%;
            max-width: 950px;
            background: var(--poke-red);
            border: 8px solid #333;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 15px 15px 0px #222;
        }

        .header-light {
            width: 40px;
            height: 40px;
            background: #00f2ff;
            border: 4px solid white;
            border-radius: 50%;
            margin-bottom: 20px;
            box-shadow: 0 0 10px #00f2ff;
        }

        .main-screen {
            background: white;
            border: 6px solid #555;
            border-radius: 10px;
            padding: 20px;
        }

        h1 { text-align: center; color: var(--poke-dark-red); text-transform: uppercase; margin-top: 0; }

        .trainer-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            padding: 15px;
            background: #eee;
            border-radius: 8px;
        }

        .pokemon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .pokemon-card {
            background: #fdfdfd;
            border: 3px solid var(--poke-blue);
            border-radius: 12px;
            padding: 15px;
            position: relative;
        }

        /* Área da Imagem */
        .sprite-container {
            width: 120px;
            height: 120px;
            background: var(--screen-bg);
            margin: 0 auto 10px;
            border: 4px solid #555;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .sprite-container img {
            width: 100px;
            height: 100px;
            display: none;
            image-rendering: pixelated;
        }

        /* Busca de Pokémon */
        .search-container { position: relative; }
        .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ccc;
            max-height: 150px;
            overflow-y: auto;
            z-index: 10;
            display: none;
        }
        .dropdown div {
            padding: 8px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .dropdown div:hover { background: var(--poke-yellow); }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 2px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-save {
            display: block;
            width: 200px;
            margin: 30px auto 0;
            padding: 15px;
            background: var(--poke-yellow);
            border: 3px solid var(--poke-blue);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .save-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2e7d32;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>

<div class="pokedex">
    <div class="header-light"></div>
    
    <div class="main-screen">
        <h1>PokéSheet v2.0</h1>

        <div class="trainer-info">
            <div><label>Treinador:</label><input type="text" id="t-name" class="auto-save"></div>
            <div><label>Classe:</label><input type="text" id="t-class" class="auto-save"></div>
            <div><label>Insígnias:</label><input type="number" id="t-badges" class="auto-save"></div>
        </div>

        <div class="pokemon-grid" id="team">
            </div>

        <button class="btn-save" onclick="exportJSON()">Exportar Arquivo .JSON</button>
    </div>
</div>

<div class="save-toast" id="toast">Alteração salva!</div>

<script>
    let allPokemonNames = [];

    // 1. Carregar lista da PokéAPI
    async function loadPokeList() {
        try {
            const resp = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
            const data = await resp.json();
            allPokemonNames = data.results;
            initTeam();
        } catch (e) {
            console.error("Erro ao carregar lista", e);
        }
    }

    // 2. Criar os slots do time (6 Pokémon)
    function initTeam() {
        const teamContainer = document.getElementById('team');
        for (let i = 1; i <= 6; i++) {
            teamContainer.innerHTML += `
                <div class="pokemon-card">
                    <div class="sprite-container">
                        <img id="img-${i}" src="" alt="Sprite">
                    </div>
                    <div class="search-container">
                        <label>Pokémon #${i}</label>
                        <input type="text" id="p${i}-name" placeholder="Pesquisar Pokémon..." oninput="searchPoke(${i})" class="auto-save">
                        <div id="drop-${i}" class="dropdown"></div>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:10px;">
                        <input type="text" id="p${i}-nick" placeholder="Apelido" class="auto-save">
                        <input type="number" id="p${i}-lvl" placeholder="Lvl" class="auto-save">
                    </div>
                    <textarea id="p${i}-moves" rows="2" placeholder="Movimentos..." class="auto-save"></textarea>
                </div>
            `;
        }
        loadSavedData();
    }

    // 3. Sistema de Busca e Filtro
    function searchPoke(slot) {
        const input = document.getElementById(`p${slot}-name`);
        const dropdown = document.getElementById(`drop-${slot}`);
        const query = input.value.toLowerCase();
        
        dropdown.innerHTML = "";
        if (query.length < 2) { dropdown.style.display = "none"; return; }

        const matches = allPokemonNames.filter(p => p.name.includes(query)).slice(0, 5);
        
        if (matches.length > 0) {
            dropdown.style.display = "block";
            matches.forEach(p => {
                const div = document.createElement('div');
                div.innerText = p.name.charAt(0).toUpperCase() + p.name.slice(1);
                div.onclick = () => selectPoke(slot, p.name);
                dropdown.appendChild(div);
            });
        } else {
            dropdown.style.display = "none";
        }
    }

    // 4. Selecionar Pokémon e Buscar Imagem
    async function selectPoke(slot, name) {
        document.getElementById(`p${slot}-name`).value = name;
        document.getElementById(`drop-${slot}`).style.display = "none";
        
        const img = document.getElementById(`img-${slot}`);
        try {
            const resp = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
            const data = await resp.json();
            // Pega a arte oficial que é mais bonita
            const spriteUrl = data.sprites.other['official-artwork'].front_default;
            img.src = spriteUrl;
            img.style.display = "block";
            
            // Salva no localStorage que o ID da imagem mudou
            localStorage.setItem(`img-${slot}`, spriteUrl);
            saveToLocal();
        } catch (e) {
            console.error("Erro ao buscar imagem");
        }
    }

    // 5. Salvar e Carregar
    function saveToLocal() {
        const inputs = document.querySelectorAll('.auto-save');
        inputs.forEach(input => {
            localStorage.setItem(input.id, input.value);
        });
        
        const toast = document.getElementById('toast');
        toast.style.display = "block";
        setTimeout(() => toast.style.display = "none", 1000);
    }

    function loadSavedData() {
        const inputs = document.querySelectorAll('.auto-save');
        inputs.forEach(input => {
            const val = localStorage.getItem(input.id);
            if (val) input.value = val;
        });

        // Carrega as imagens salvas
        for (let i = 1; i <= 6; i++) {
            const savedImg = localStorage.getItem(`img-${i}`);
            if (savedImg) {
                const img = document.getElementById(`img-${i}`);
                img.src = savedImg;
                img.style.display = "block";
            }
        }
    }

    // Evento para salvar ao digitar
    document.addEventListener('input', (e) => {
        if (e.target.classList.contains('auto-save')) {
            saveToLocal();
        }
    });

    function exportJSON() {
        const data = {};
        document.querySelectorAll('.auto-save').forEach(i => data[i.id] = i.value);
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'ficha_rpg.json';
        a.click();
    }

    loadPokeList();
</script>

</body>
</html>
