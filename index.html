<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéSheet Premium - RPG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #ef4444; 
            --secondary: #3b82f6; --text: #f8fafc; --muted: #94a3b8;
            --border: #334155; --input: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 15px; }

        .container { max-width: 1100px; margin: auto; display: flex; flex-direction: column; gap: 20px; }

        /* Estilo Dashboard */
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
        .header-top { border-top: 4px solid var(--primary); }

        .grid-header { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }

        label { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select, textarea { background: var(--input); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; width: 100%; outline: none; font-size: 0.9rem; }
        input:focus { border-color: var(--secondary); }

        /* Cards do Time */
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .pkmn-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; display: flex; flex-direction: column; gap: 12px; transition: 0.3s; }
        .pkmn-card:hover { border-color: var(--muted); }

        .pkmn-top { display: grid; grid-template-columns: 80px 1fr; gap: 12px; }
        .sprite-box { width: 80px; height: 80px; background: #0f172a; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
        .sprite-box img { width: 75px; height: 75px; display: none; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

        /* Busca */
        .search-area { position: relative; }
        .dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #1e293b; border: 1px solid var(--secondary); border-radius: 8px; max-height: 150px; overflow-y: auto; z-index: 10; display: none; }
        .dropdown div { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .dropdown div:hover { background: var(--secondary); }

        .pkmn-stats { display: grid; grid-template-columns: 1fr 80px; gap: 10px; }
        .moves-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }

        .btn-save { background: var(--secondary); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 10px; }
        .status { text-align: center; font-size: 0.8rem; color: #10b981; margin-top: 5px; opacity: 0; }
        .status.show { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel header-top">
        <label>Treinador Pokémon</label>
        <div class="grid-header">
            <input type="text" id="t-name" class="save" placeholder="Nome">
            <input type="text" id="t-class" class="save" placeholder="Classe">
            <input type="text" id="t-region" class="save" placeholder="Região">
            <input type="number" id="t-money" class="save" placeholder="Dinheiro">
        </div>
    </div>

    <div class="team-grid" id="team"></div>

    <div class="panel">
        <label>Notas e Inventário</label>
        <textarea id="notes" rows="4" class="save" placeholder="Sua jornada começa aqui..."></textarea>
        <button class="btn-save" onclick="exportData()">Exportar Ficha (.JSON)</button>
        <div id="status" class="status">Salvo com sucesso!</div>
    </div>
</div>

<script>
    let allPkmn = [];
    const moveCache = {};
    const natures = ['Adamant', 'Bashful', 'Bold', 'Brave', 'Calm', 'Careful', 'Docile', 'Gentle', 'Hardy', 'Hasty', 'Impish', 'Jolly', 'Lonely', 'Mild', 'Modest', 'Naive', 'Naughty', 'Quiet', 'Quirky', 'Rash', 'Relaxed', 'Sassy', 'Serious', 'Timid'];

    function format(str) {
        return str.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }

    async function init() {
        renderSlots();
        loadSaved();
        const r = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
        const d = await r.json();
        allPkmn = d.results;
    }

    function renderSlots() {
        const team = document.getElementById('team');
        for(let i=1; i<=6; i++) {
            team.innerHTML += `
                <div class="pkmn-card">
                    <div class="pkmn-top">
                        <div class="sprite-box"><img id="img-${i}"></div>
                        <div class="search-area">
                            <label>Pokémon #${i}</label>
                            <input type="text" id="p${i}-name" class="save" placeholder="Buscar..." oninput="doSearch(${i})" autocomplete="off">
                            <div id="drop-${i}" class="dropdown"></div>
                        </div>
                    </div>
                    <div class="pkmn-stats">
                        <div>
                            <label>Nature</label>
                            <select id="p${i}-nature" class="save">
                                <option value="">Selecionar...</option>
                                ${natures.map(n => `<option value="${n}">${n}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label>Lvl</label>
                            <input type="number" id="p${i}-lvl" class="save" value="1" onchange="updateMoves(${i})">
                        </div>
                    </div>
                    <div class="moves-grid">
                        <select id="p${i}-m1" class="save"><option value="">Golpe 1</option></select>
                        <select id="p${i}-m2" class="save"><option value="">Golpe 2</option></select>
                        <select id="p${i}-m3" class="save"><option value="">Golpe 3</option></select>
                        <select id="p${i}-m4" class="save"><option value="">Golpe 4</option></select>
                    </div>
                </div>`;
        }
    }

    function doSearch(slot) {
        const q = document.getElementById(`p${slot}-name`).value.toLowerCase();
        const drop = document.getElementById(`drop-${slot}`);
        drop.innerHTML = "";
        if(q.length < 2) { drop.style.display="none"; return; }
        const hits = allPkmn.filter(p => p.name.includes(q)).slice(0, 5);
        if(hits.length) {
            drop.style.display="block";
            hits.forEach(p => {
                const div = document.createElement('div');
                div.innerText = format(p.name);
                div.onclick = () => selectPkmn(slot, p.name);
                drop.appendChild(div);
            });
        }
    }

    async function selectPkmn(slot, name) {
        document.getElementById(`p${slot}-name`).value = format(name);
        document.getElementById(`drop-${slot}`).style.display = "none";
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        const data = await res.json();
        document.getElementById(`img-${slot}`).src = data.sprites.other['official-artwork'].front_default || data.sprites.front_default;
        document.getElementById(`img-${slot}`).style.display = "block";
        moveCache[slot] = data.moves;
        updateMoves(slot);
        save();
    }

    function updateMoves(slot) {
        const moves = moveCache[slot];
        if(!moves) return;
        const lvl = parseInt(document.getElementById(`p${slot}-lvl`).value) || 1;
        const available = moves.filter(m => m.version_group_details.some(d => d.move_learn_method.name === 'level-up' && d.level_learned_at <= lvl)).map(m => m.move.name);
        const unique = [...new Set(available)].map(format).sort();
        
        for(let i=1; i<=4; i++) {
            const sel = document.getElementById(`p${slot}-m${i}`);
            const old = sel.value;
            sel.innerHTML = '<option value="">Golpe</option>';
            unique.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m; opt.innerText = m;
                sel.appendChild(opt);
            });
            sel.value = old;
        }
    }

    function save() {
        document.querySelectorAll('.save').forEach(el => localStorage.setItem(el.id, el.value));
        for(let i=1; i<=6; i++) {
            const img = document.getElementById(`img-${i}`).src;
            if(img) localStorage.setItem(`img-${i}`, img);
        }
        const s = document.getElementById('status');
        s.classList.add('show');
        setTimeout(() => s.classList.remove('show'), 2000);
    }

    function loadSaved() {
        document.querySelectorAll('.save').forEach(el => {
            const v = localStorage.getItem(el.id);
            if(v) el.value = v;
        });
        for(let i=1; i<=6; i++) {
            const src = localStorage.getItem(`img-${i}`);
            if(src) {
                const img = document.getElementById(`img-${i}`);
                img.src = src; img.style.display = "block";
                const n = document.getElementById(`p${i}-name`).value;
                if(n) fetchMovesSilently(i, n.toLowerCase().replace(/ /g, '-'));
            }
        }
    }

    async function fetchMovesSilently(slot, name) {
        const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        if(r.ok) {
            const d = await r.json();
            moveCache[slot] = d.moves;
            updateMoves(slot);
        }
    }

    function exportData() {
        const data = {};
        document.querySelectorAll('.save').forEach(el => data[el.id] = el.value);
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'ficha.json';
        a.click();
    }

    document.addEventListener('change', (e) => { if(e.target.classList.contains('save')) save(); });
    init();
</script>
</body>
</html>
