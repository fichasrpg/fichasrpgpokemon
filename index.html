<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéSheet Cloud v5.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root {
            --bg: #0b0f1a; --card: #161e2d; --primary: #ff4747; 
            --secondary: #4785ff; --text: #f1f5f9; --muted: #64748b;
            --border: #2d3748; --input: #0b0f1a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 10px; }
        .container { max-width: 1100px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        .auth-bar { background: linear-gradient(90deg, #1a202c, #2d3748); padding: 15px 20px; border-radius: 12px; display: flex; gap: 12px; align-items: center; border: 1px solid var(--border); justify-content: space-between; flex-wrap: wrap; }
        .auth-inputs { display: flex; gap: 8px; align-items: center; }
        .auth-bar input { background: #000; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; width: 140px; }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; box-shadow: 0 15px 25px rgba(0,0,0,0.4); }
        .header-top { border-left: 6px solid var(--primary); display: flex; gap: 25px; flex-wrap: wrap; align-items: center; }
        .avatar-box { width: 130px; height: 130px; background: var(--input); border: 2px dashed var(--muted); border-radius: 20px; overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .grid-header { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        label { font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select, textarea { background: var(--input); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; width: 100%; outline: none; }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 18px; }
        .pkmn-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .sprite-box { width: 70px; height: 70px; background: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .sprite-box img { width: 65px; height: 65px; }
        .search-results { position: absolute; top: 100%; left: 0; right: 0; background: #1a202c; border: 1px solid var(--secondary); border-radius: 8px; z-index: 100; max-height: 200px; overflow-y: auto; display: none; }
        .search-results div { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .search-results div:hover { background: var(--secondary); }
        .btn { padding: 10px 18px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
        .btn-blue { background: var(--secondary); color: white; }
        .btn-green { background: #10b981; color: white; }
        #crop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .crop-area { max-width: 80%; max-height: 70vh; }
    </style>
</head>
<body>

<div class="container">
    <div class="auth-bar">
        <div style="font-weight: 800; color: var(--primary);">POKÉSHEET CLOUD</div>
        <div class="auth-inputs">
            <input type="text" id="user-id" placeholder="Usuário">
            <input type="password" id="user-pass" placeholder="Senha">
            <button class="btn btn-green" onclick="cloudAction('save')">Salvar</button>
            <button class="btn btn-blue" onclick="cloudAction('load')">Entrar</button>
        </div>
    </div>

    <div class="panel header-top">
        <div onclick="document.getElementById('file-input').click()" class="avatar-box">
            <img id="main-avatar" style="display:none">
            <span id="placeholder">FOTO</span>
        </div>
        <input type="file" id="file-input" hidden accept="image/*">
        
        <div class="grid-header">
            <div><label>Nome</label><input type="text" id="t-name" class="save"></div>
            <div>
                <label>Classe</label>
                <select id="t-class" class="save">
                    <option value="Treinador">Treinador</option>
                    <option value="Rocket">Equipe Rocket</option>
                    <option value="Cientista">Cientista</option>
                </select>
            </div>
            <div><label>Região Natal</label><select id="t-region" class="save" onchange="updateCities()"></select></div>
            <div><label>Cidade Natal</label><select id="t-city" class="save"></select></div>
        </div>
    </div>

    <div id="team" class="team-grid"></div>

    <div class="panel">
        <label>Diário</label>
        <textarea id="notes" class="save" rows="3"></textarea>
    </div>
</div>

<div id="crop-modal">
    <div class="crop-area"><img id="image-to-crop"></div>
    <button class="btn btn-green" style="margin-top:20px" onclick="finishCrop()">CORTAR</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
    const SUPABASE_URL = 'https://pjggfdjixenopkiiugmj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqZ2Zkaml4ZW5vcGtpaXVnbWoiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NDU5OTMzNCwiZXhwIjoyMDYwMTc1MzM0fQ.z18_lI7q789FTLdYdDUtUosk0';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allPkmn = [];
    let moveCache = {};
    let cropper;

    const worldData = {
        "Kanto": ["Pallet Town", "Viridian City", "Pewter City"],
        "Johto": ["New Bark Town", "Cherrygrove City"],
        "Paldea": ["Mesagoza", "Levincia"] // Adicione as outras conforme desejar
    };

    function format(str) { return str.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '); }

    async function init() {
        const regSelect = document.getElementById('t-region');
        regSelect.innerHTML = '<option value="">Região...</option>';
        Object.keys(worldData).forEach(r => regSelect.innerHTML += `<option value="${r}">${r}</option>`);
        
        renderSlots();
        const r = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
        const d = await r.json();
        allPkmn = d.results;
    }

    function renderSlots() {
        const team = document.getElementById('team');
        const nats = ['Adamant', 'Bold', 'Timid', 'Modest'];
        team.innerHTML = "";
        for(let i=1; i<=6; i++) {
            team.innerHTML += `
            <div class="pkmn-card">
                <div style="display:flex; gap:10px; align-items:center;">
                    <div class="sprite-box"><img id="img-${i}" style="display:none"></div>
                    <div style="flex:1; position:relative">
                        <input type="text" id="p${i}-name" class="save" oninput="doSearch(${i})" placeholder="Pokémon...">
                        <div id="drop-${i}" class="search-results"></div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 60px; gap:5px">
                    <select id="p${i}-nature" class="save"><option value="">Nature</option>${nats.map(n=>`<option value="${n}">${n}</option>`).join('')}</select>
                    <input type="number" id="p${i}-lvl" class="save" value="1" onchange="updateMoves(${i})">
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px">
                    <select id="p${i}-m1" class="save"></select><select id="p${i}-m2" class="save"></select>
                    <select id="p${i}-m3" class="save"></select><select id="p${i}-m4" class="save"></select>
                </div>
            </div>`;
        }
    }

    function doSearch(slot) {
        const q = document.getElementById(`p${slot}-name`).value.toLowerCase();
        const drop = document.getElementById(`drop-${slot}`);
        drop.innerHTML = "";
        if(q.length < 2) return drop.style.display="none";
        const hits = allPkmn.filter(p => p.name.includes(q)).slice(0, 5);
        if(hits.length) {
            drop.style.display="block";
            hits.forEach(p => {
                const d = document.createElement('div');
                d.innerText = format(p.name);
                d.onclick = () => selectPkmn(slot, p.name);
                drop.appendChild(d);
            });
        }
    }

    async function selectPkmn(slot, name) {
        document.getElementById(`p${slot}-name`).value = format(name);
        document.getElementById(`drop-${slot}`).style.display = "none";
        const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        const d = await r.json();
        document.getElementById(`img-${slot}`).src = d.sprites.front_default;
        document.getElementById(`img-${slot}`).style.display = "block";
        moveCache[slot] = d.moves;
        updateMoves(slot);
    }

    function updateMoves(slot) {
        const moves = moveCache[slot]; if(!moves) return;
        const lvl = parseInt(document.getElementById(`p${slot}-lvl`).value);
        const avail = moves.filter(m => m.version_group_details.some(vd => vd.level_learned_at <= lvl)).map(m => m.move.name);
        const unique = [...new Set(avail)].map(format).sort();
        for(let i=1; i<=4; i++) {
            const s = document.getElementById(`p${slot}-m${i}`);
            const old = s.value;
            s.innerHTML = '<option value="">Golpe</option>';
            unique.forEach(m => s.innerHTML += `<option value="${m}">${m}</option>`);
            s.value = old;
        }
    }

    async function cloudAction(type) {
        const user = document.getElementById('user-id').value;
        const pass = document.getElementById('user-pass').value;
        if(!user || !pass) return alert("Preencha os dados!");

        if(type === 'save') {
            const sheet = {};
            document.querySelectorAll('.save').forEach(el => sheet[el.id] = el.value);
            const { error } = await _supabase.from('fichas').upsert({ username: user, password: pass, data: sheet, avatar: document.getElementById('main-avatar').src }, { onConflict: 'username' });
            if(error) alert("Erro: " + error.message); else alert("Sincronizado!");
        } else {
            const { data, error } = await _supabase.from('fichas').select('*').eq('username', user).single();
            if(data && data.password === pass) {
                Object.keys(data.data).forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = data.data[id]; });
                if(data.avatar) { document.getElementById('main-avatar').src = data.avatar; document.getElementById('main-avatar').style.display='block'; document.getElementById('placeholder').style.display='none'; }
                updateCities();
                alert("Carregado!");
            } else alert("Dados incorretos.");
        }
    }

    function updateCities() {
        const r = document.getElementById('t-region').value;
        const s = document.getElementById('t-city');
        s.innerHTML = '<option value="">Cidade...</option>';
        if(worldData[r]) worldData[r].forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
    }

    document.getElementById('file-input').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = document.getElementById('image-to-crop');
            img.src = event.target.result;
            document.getElementById('crop-modal').style.display = 'flex';
            if(cropper) cropper.destroy();
            cropper = new Cropper(img, { aspectRatio: 1, viewMode: 1 });
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function finishCrop() {
        const canvas = cropper.getCroppedCanvas({ width: 250, height: 250 });
        document.getElementById('main-avatar').src = canvas.toDataURL();
        document.getElementById('main-avatar').style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('crop-modal').style.display = 'none';
    }

    init();
</script>
</body>
</html>
