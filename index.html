<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéSheet Cloud Ultra - Mobile Optimized</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root {
            --bg: #05080f;
            --surface: rgba(20, 27, 45, 0.7);
            --primary: #ff3e3e;
            --secondary: #3b82f6;
            --accent: #10b981;
            --border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #111827, #05080f);
            color: var(--text);
            padding: 15px;
            min-height: 100vh;
        }

        .container { max-width: 1100px; margin: auto; display: flex; flex-direction: column; gap: 20px; }

        /* Auth Bar Otimizada */
        .auth-bar {
            background: var(--surface);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid var(--border);
            text-align: center;
        }

        @media (min-width: 768px) {
            .auth-bar { flex-direction: row; justify-content: space-between; }
        }

        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; background: linear-gradient(to right, #ff3e3e, #f87171); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .auth-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        @media (min-width: 768px) { .auth-inputs { display: flex; width: auto; } }
        
        .auth-inputs input { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 12px; width: 100%; }

        .section-tag { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .section-tag h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); }
        .line { height: 1px; flex: 1; background: var(--border); }

        .panel {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
        }

        .trainer-header { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        @media (min-width: 768px) { .trainer-header { flex-direction: row; align-items: flex-start; } }
        
        .avatar-box {
            width: 140px; height: 140px; border-radius: 30px;
            background: #000; border: 2px dashed var(--border);
            cursor: pointer; overflow: hidden; display: flex;
            align-items: center; justify-content: center;
        }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        .form-grid { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (min-width: 768px) { .form-grid { grid-template-columns: repeat(3, 1fr); } }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .full-mobile { grid-column: span 2; }

        label { font-size: 0.6rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }

        input, select, textarea {
            background: rgba(0,0,0,0.2); border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 14px; font-size: 0.9rem; width: 100%;
        }

        .team-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) { .team-grid { grid-template-columns: 1fr 1fr; } }

        .pkmn-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 22px; padding: 15px; display: flex; flex-direction: column; gap: 10px;
        }

        .sprite-frame { 
            width: 65px; height: 65px; background: #000; border-radius: 16px; 
            display: flex; align-items: center; justify-content: center; border: 1px solid var(--border);
        }

        .inv-layout { display: flex; flex-direction: column; gap: 15px; }
        @media (min-width: 768px) { .inv-layout { display: grid; grid-template-columns: 1fr 220px; } }

        .money-box {
            background: linear-gradient(135deg, #064e3b, #022c22);
            border-radius: 20px; padding: 15px; text-align: center; border: 1px solid var(--accent);
        }
        .money-box input { background: transparent; border: none; font-size: 1.5rem; text-align: center; font-weight: 800; color: var(--accent); }

        .btn {
            padding: 12px; border-radius: 12px; border: none; 
            font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 0.7rem;
        }
        .btn-green { background: var(--accent); color: #05080f; }
        .btn-blue { background: var(--secondary); color: white; }
        .btn-convert { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; width: 100%; margin-top: 10px; }

        #crop-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
        }
        .crop-wrap { width: 90%; max-width: 350px; height: 350px; background: #000; }
    </style>
</head>
<body>

<div class="container">
    <div class="auth-bar">
        <div class="logo">POKÉSHEET CLOUD</div>
        <div class="auth-inputs">
            <input type="text" id="user-id" placeholder="Usuário">
            <input type="password" id="user-pass" placeholder="Senha">
            <button class="btn btn-green" onclick="cloudAction('save')">SALVAR</button>
            <button class="btn btn-blue" onclick="cloudAction('load')">ENTRAR</button>
        </div>
    </div>

    <div class="section-tag"><h2>Treinador</h2><div class="line"></div></div>

    <div class="panel trainer-header">
        <div onclick="document.getElementById('file-input').click()" class="avatar-box">
            <img id="main-avatar" style="display:none">
            <span id="placeholder" style="font-size:0.6rem; color:var(--text-dim)">FOTO</span>
        </div>
        <input type="file" id="file-input" hidden accept="image/*">

        <div class="form-grid">
            <div class="input-group full-mobile"><label>Nome</label><input type="text" id="t-name" class="save"></div>
            <div class="input-group"><label>Sexo</label><select id="t-sex" class="save"><option value="">-</option><option value="M">Masc</option><option value="F">Fem</option></select></div>
            <div class="input-group"><label>Idade</label><input type="number" id="t-age" class="save"></div>
            <div class="input-group full-mobile"><label>Classe</label><select id="t-class" class="save"><option value="Treinador">Treinador</option><option value="Rocket">Equipe Rocket</option></select></div>
            <div class="input-group"><label>Região</label><select id="t-region" class="save" onchange="updateCities()"></select></div>
            <div class="input-group"><label>Cidade</label><select id="t-city" class="save"></select></div>
        </div>
    </div>

    <div class="section-tag"><h2>Equipe</h2><div class="line"></div></div>
    <div id="team" class="team-grid"></div>

    <div class="section-tag"><h2>Bolsa</h2><div class="line"></div></div>
    <div class="panel inv-layout">
        <textarea id="t-bag" class="save" rows="4" placeholder="Itens..."></textarea>
        <div class="money-box">
            <label style="color:var(--accent)">DINHEIRO</label>
            <div style="display:flex; align-items:center; justify-content:center">
                <span style="color:var(--accent); margin-right:5px">₽</span>
                <input type="text" id="t-money" class="save" value="0">
            </div>
        </div>
    </div>

    <button class="btn btn-convert" onclick="convertSheet()">✨ GERAR TEXTO</button>
    <div id="convert-result" style="display:none; background:#000; padding:15px; border-radius:15px; font-family:monospace; font-size:0.8rem; margin-bottom:40px;"></div>
</div>

<div id="crop-modal">
    <div class="crop-wrap"><img id="image-to-crop"></div>
    <div style="margin-top:20px; display:flex; gap:10px;">
        <button class="btn" style="background:#444" onclick="document.getElementById('crop-modal').style.display='none'">Sair</button>
        <button class="btn btn-green" onclick="finishCrop()">Cortar</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    // Configurações e Funções (Supabase, PokeAPI, etc.)
    const SUPABASE_URL = 'https://pjggfdjixenopkiiugmj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqZ2dmZGppeGVub3BraWl1Z21qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMjIwMDcsImV4cCI6MjA5MTY5ODAwN30.QWr9d3qT2216to7VOEmc_hzu-g789FTLdYdDUtUosk0';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allPkmn = [];
    let moveCache = {};
    let cropper;
    const natures = ['Adamant', 'Bold', 'Brave', 'Calm', 'Careful', 'Hardy', 'Jolly', 'Modest', 'Naive', 'Quiet', 'Sassy', 'Timid'];
    const worldData = {"Kanto":["Pallet Town","Pewter City","Saffron City"],"Johto":["New Bark Town","Goldenrod City"],"Hoenn":["Littleroot Town","Rustboro City"],"Sinnoh":["Twinleaf Town","Jubilife City"],"Unova":["Nuvema Town","Castelia City"],"Kalos":["Lumiose City"],"Alola":["Hau'oli City"],"Galar":["Wyndon"],"Paldea":["Mesagoza"]};

    function format(str) { return str.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '); }

    async function init() {
        const regSelect = document.getElementById('t-region');
        regSelect.innerHTML = '<option value="">Região...</option>';
        Object.keys(worldData).forEach(r => regSelect.innerHTML += `<option value="${r}">${r}</option>`);
        renderSlots();
        try {
            const r = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
            const d = await r.json();
            allPkmn = d.results;
        } catch(e) {}
    }

    function renderSlots() {
        const team = document.getElementById('team'); team.innerHTML = "";
        for(let i=1; i<=6; i++) {
            team.innerHTML += `
            <div class="pkmn-card">
                <div style="display:flex; gap:10px; align-items:center">
                    <div class="sprite-frame"><img id="img-${i}" style="display:none; width:55px"></div>
                    <div style="flex:1">
                        <input type="text" id="p${i}-name" class="save" oninput="doSearch(${i})" placeholder="Pokémon #${i}">
                        <div id="drop-${i}" class="results-box" style="position:absolute; background:#1e293b; z-index:10; display:none"></div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                    <select id="p${i}-nature" class="save"><option value="">Nature</option>${natures.map(n=>`<option value="${n}">${n}</option>`).join('')}</select>
                    <input type="number" id="p${i}-lvl" class="save" value="1" placeholder="Nível">
                </div>
            </div>`;
        }
    }

    // [Reutilizar funções cloudAction, doSearch, selectPkmn, finishCrop do código anterior]
    // Abaixo apenas o essencial para o salvamento funcionar:

    async function cloudAction(type) {
        const user = document.getElementById('user-id').value;
        const pass = document.getElementById('user-pass').value;
        if(!user || !pass) return alert("Acesso vazio!");
        
        if(type === 'save') {
            const sheet = {}; document.querySelectorAll('.save').forEach(el => sheet[el.id] = el.value);
            const { error } = await _supabase.from('fichas').upsert({ username: user, password: pass, data: sheet, avatar: document.getElementById('main-avatar').src }, { onConflict: 'username' });
            alert(error ? "Erro ao salvar" : "Sincronizado!");
        } else {
            const { data } = await _supabase.from('fichas').select('*').eq('username', user).single();
            if(data && data.password === pass) {
                Object.keys(data.data).forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = data.data[id]; });
                if(data.avatar) { document.getElementById('main-avatar').src = data.avatar; document.getElementById('main-avatar').style.display='block'; document.getElementById('placeholder').style.display='none'; }
                alert("Dados carregados!");
            } else alert("Senha incorreta!");
        }
    }

    function updateCities() {
        const r = document.getElementById('t-region').value;
        const s = document.getElementById('t-city');
        s.innerHTML = '<option value="">Cidade...</option>';
        if(worldData[r]) worldData[r].forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
    }

    document.getElementById('file-input').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            document.getElementById('image-to-crop').src = event.target.result;
            document.getElementById('crop-modal').style.display = 'flex';
            if(cropper) cropper.destroy();
            cropper = new Cropper(document.getElementById('image-to-crop'), { aspectRatio: 1, viewMode: 1 });
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function finishCrop() {
        const canvas = cropper.getCroppedCanvas({ width: 300, height: 300 });
        document.getElementById('main-avatar').src = canvas.toDataURL();
        document.getElementById('main-avatar').style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('crop-modal').style.display = 'none';
    }

    init();
</script>
</body>
        </html>
